name: sec-edgar-mcp
displayName: SEC EDGAR Financial Data
description: |
  SEC EDGAR financial data tools for AI assistants. Search companies, pull financial statements,
  browse filings, track insider trades, and view stock price history.
  Free — no API key required (uses public SEC API).
version: 1.0.0
license: MIT
categories:
  - finance
  - research
  - compliance
tags:
  - sec
  - edgar
  - finance
  - stocks
  - 10-K
  - insider-trading
  - financial-statements
startCommand:
  type: http
  url: https://sec-edgar-mcp-production-1f82.up.railway.app/mcp
  configSchema:
    type: object
    properties:
      secUserAgent:
        type: string
        title: SEC User Agent
        description: "Required by SEC. Format: 'Company Name admin@example.com'"
      apiKey:
        type: string
        title: API Key (Optional)
        description: "Remove the 10 calls/day limit."
    required:
      - secUserAgent
  exampleConfig:
    secUserAgent: "MyApp admin@example.com"
    apiKey: "km_your_key_here"
