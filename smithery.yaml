name: sec-edgar-mcp
displayName: SEC EDGAR Financial Data
description: |
  Access SEC EDGAR financial data directly from AI assistants. Search companies, pull structured
  financials from 10-K/10-Q filings, track insider trades, and full-text search across all SEC filings.
  No API key required — uses free public SEC data.
version: 1.0.0
license: MIT
categories:
  - finance
  - investment
  - data
tags:
  - sec
  - edgar
  - financials
  - 10-K
  - earnings
  - insider-trading
  - stocks
  - investment
startCommand:
  type: http
  configSchema:
    type: object
    properties:
      secUserAgent:
        type: string
        title: SEC User-Agent
        description: "Required by SEC: your name and email (e.g. 'MyApp/1.0 me@example.com')"
      apiKey:
        type: string
        title: API Key (Optional)
        description: "Remove the 10 calls/day limit."
    required: []
  exampleConfig:
    secUserAgent: "MyApp/1.0 contact@example.com"
    apiKey: "km_your_key_here"
